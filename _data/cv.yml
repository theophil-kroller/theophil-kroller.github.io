        location: Graz, Austria
        start_date: 2023-12
        end_date: Present
        summary: >
          Research and teaching in general management, organization, entrepreneurship, and business models.
        highlights:
          - Teaching and co-teaching in general management, organization, and entrepreneurship.
          - Supporting students in applying conceptual frameworks to real-world cases, startup ideas, and organizational challenges.
          - Research interests include green transition, circular and regenerative economy, technology leadership, and business model innovation.

      - company: KNAPP AG
        position: Logistics and Process Design Engineer | Lead Software Engineer
        location: Austria
        start_date: 2018-03
        end_date: 2023-09
        summary: >
          Designed and implemented intralogistics solutions for international customers.
        highlights:
          - Designed automated warehouse solutions and streamlined business processes for customers in the EU, LATAM, and China.
          - Created business process specifications and acceptance test specifications.
          - Collaborated with mechanical engineering, electrical engineering, software development, commissioning, and project management teams.
          - Facilitated customer workshops and supported requirements engineering.
          - Oversaw factory acceptance tests.
          - Strengthened cross-functional and cross-cultural collaboration skills.

      - company: Pöyry Management Consulting Austria
        position: Energy Market Analyst | Internship
        location: Austria
        start_date: 2017-08
        end_date: 2017-12
        summary: >
          Conducted energy market research and data analysis for Central and South-Eastern European markets.
        highlights:
          - Analyzed energy market information using Excel and R.
          - Created presentations for national clients.
          - Contributed to wholesale electricity market reports.
          - Conducted research on the energy market of Kazakhstan, including regulatory frameworks, market structures, and potential policy developments.
          - Processed and visualized large-scale datasets with R.
          - Supported business development through target screening and translation of promotional material.

      - company: University of Applied Sciences Technikum Wien
        position: Lecturer | Junior Researcher
        location: Vienna, Austria
        start_date: 2014-01
        end_date: 2017-02
        summary: >
          Taught undergraduate and graduate courses and contributed to applied environmental research.
        highlights:
          - Taught courses at undergraduate and graduate level.
          - Coached students in applied research projects in ecotoxicology and air pollution monitoring.
          - Supervised master thesis work.
          - Coordinated external lecturers.
          - Set up and carried out experiments.
          - Analyzed data with R and Excel.
          - Optimized and validated a novel method for screening samples for endocrine disruptors.
          - Presented research results at an international academic conference.
          - Designed cases for problem-based learning.

