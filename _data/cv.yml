cv:
  name: Theophil Kroller
  label: Doctoral Researcher & Lecturer | Green Transition | Entrepreneurship Education
  image: ""
  summary: >
    Doctoral researcher and lecturer at Graz University of Technology with a professional background in
    higher education, intralogistics, energy markets, environmental research, and applied management.
    My teaching focuses on entrepreneurship, general management, organization, business model development,
    and application-oriented learning. My research interests include sustainability-oriented transformation,
    circular and regenerative economic systems, technology leadership, and business model innovation.
    My interdisciplinary academic background spans industrial engineering, environmental management and
    ecotoxicology, business studies, China studies, and psychosocial counseling, with international experience
    in Austria, China, Japan, and the United States.

