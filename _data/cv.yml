cv:
  name: Theophil Kroller
  label: Doctoral Researcher & Lecturer | Green Transition | Entrepreneurship Education
  image: ""
  summary: >
    Doctoral researcher and lecturer at Graz University of Technology with experience in higher education,
    intralogistics, energy, and environmental research. My teaching focuses on entrepreneurship, general
    management, organization, and applied learning. My research interests include the green transition,
    circular and regenerative economic systems, technology leadership, and business model innovation.
    My academic background spans engineering, ecotoxicology, business administration, China studies,
    and psychosocial counseling, with international experience in Austria, China, Japan, and the USA.

