          Designed and implemented intralogistics and warehouse control solutions for international customers.
        highlights:
          - Designed automated warehouse processes for customers in the EU, Latin America, and China.
          - Created business process specifications and acceptance test specifications.
          - Facilitated customer workshops and supported requirements engineering.
          - Collaborated with mechanical engineering, electrical engineering, software development, commissioning, and project management teams.

