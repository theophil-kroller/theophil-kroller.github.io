  sections:
    Experience:
      - company: Graz University of Technology
        position: Dr. techn. Candidate | Research and Teaching Fellow
        location: Graz, Austria
        start_date: 2023-12
        end_date: Present
        summary: >
          Research and teaching in general management, organization, entrepreneurship, business models,
          and sustainability-oriented transformation.
        highlights:
          - Teaching and co-teaching courses in general management, organization, entrepreneurship, business model development, and startup education.
          - Designing application-oriented learning formats such as case studies, role plays, group puzzles, workshops, assessment rubrics, and business model exercises.
          - Supervising and co-supervising bachelor’s and master’s theses in management, organization, technology, sustainability, and business model innovation.
          - Contributing to entrepreneurship education formats such as the Gründungsgarage and business model development workshops.
          - Research interests include circular and regenerative economy, green transition, technology leadership, strategic decision-making, and business model innovation.

      - company: Gründungsgarage
        position: Board Member | Programme Management
        location: Graz, Austria
        start_date: 2024-07
        end_date: Present
        summary: >
          Volunteer board role supporting entrepreneurship education, startup ecosystem development,
          and programme management.
        highlights:
          - Supporting programme management and development of entrepreneurship education activities.
          - Contributing to formats that connect students, startup teams, mentors, and the regional innovation ecosystem.
          - Supporting practice-oriented learning around business model development and early-stage venture creation.

      - company: Psychosocial Counseling Practice
        position: Psychosocial Counselor in Training
        location: Austria
        start_date: 2022-02
        end_date: 2025-02
        summary: >
          Counseling training and practice focused on reflective professional development, communication,
          and supporting clients in personal and relational transition processes.
        highlights:
          - Conducted counseling sessions under training and supervision.
          - Developed professional competencies in active listening, reflective dialogue, process documentation, and ethical practice.
          - Strengthened communication, facilitation, and mentoring skills relevant to teaching and supervision.

      - company: KNAPP AG
        position: Logistics and Process Design Engineer | Lead Software Engineer
        location: Austria
        start_date: 2018-03
        end_date: 2023-09
        summary: >
          Designed and implemented intralogistics and warehouse control solutions for international customers.
        highlights:
          - Designed automated warehouse solutions and business processes for customers in the EU, Latin America, and China.
          - Created business process specifications and acceptance test specifications.
          - Facilitated customer workshops and supported requirements engineering.
          - Collaborated with mechanical engineering, electrical engineering, software development, commissioning, and project management teams.
          - Oversaw factory acceptance tests and supported cross-functional implementation processes.
          - Strengthened competencies in process design, technical communication, project coordination, and cross-cultural collaboration.

      - company: Pöyry Management Consulting Austria
        position: Energy Market Analyst | Internship
        location: Austria
        start_date: 2017-08
        end_date: 2017-12
        summary: >
          Conducted energy market research and data analysis for Central and South-Eastern European markets.
        highlights:
          - Analyzed energy market information using Excel and R.
          - Created presentations and analytical material for national clients.
          - Contributed to wholesale electricity market reports.
          - Conducted research on the energy market of Kazakhstan, including regulatory frameworks, market structures, and potential policy developments.
          - Processed and visualized large-scale datasets with R.
          - Supported business development through target screening and translation of promotional material.

      - company: University of Applied Sciences Technikum Wien
        position: Lecturer | Junior Researcher
        location: Vienna, Austria
        start_date: 2014-01
        end_date: 2017-02
        summary: >
          Taught undergraduate and graduate courses and contributed to applied environmental research
          in ecotoxicology and environmental management.
        highlights:
          - Taught courses in aquatic ecotoxicology, environmental management, metrology, environmental chemistry, laboratory methods, applied research, and environmental analysis.
          - Designed and facilitated lectures, laboratory courses, research seminars, and problem-based learning formats.
          - Coached students in applied research projects in ecotoxicology and air pollution monitoring.
          - Supervised and assessed thesis-related work.
          - Coordinated external lecturers and supported course organization.
          - Set up and carried out laboratory experiments and analyzed data with R and Excel.
          - Optimized and validated a novel method for screening environmental samples for endocrine-disrupting activity.
          - Presented research results at an international academic conference.

