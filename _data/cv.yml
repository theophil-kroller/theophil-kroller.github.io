        position: Dr. techn. Candidate | Research and Teaching Fellow
        location: Graz, Austria
        start_date: 2023-12
        end_date: Present
        summary: >
          Research and teaching in general management, organization, entrepreneurship, business models,
          and sustainability-oriented transformation.
        highlights:
          - Teaching and co-teaching in general management, organization, entrepreneurship, business model development, and startup education.
          - Designing application-oriented learning formats such as case studies, role plays, group puzzles, workshops, assessment rubrics, and business model exercises.
          - Supervising and co-supervising bachelor’s and master’s theses in management, organization, technology, sustainability, and business model innovation.
          - Research on sustainability-oriented transformation, circular and regenerative economic systems, strategic decision-making, technology leadership, and business model innovation.

