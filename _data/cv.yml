cv:
  name: Theophil Kroller
  label: Doctoral Researcher & Lecturer | Green Transition | Entrepreneurship Education
  image: ""
  summary: >
    Doctoral researcher and lecturer at Graz University of Technology with an interdisciplinary background
    in industrial engineering, environmental management and ecotoxicology, business studies, China studies,
    and psychosocial counseling. My teaching focuses on entrepreneurship, general management, organization,
    business model development, and application-oriented learning. My research interests include
    sustainability-oriented transformation, circular and regenerative economic systems, strategic decision-making,
    technology leadership, and business model innovation.

